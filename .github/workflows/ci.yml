name: CI

# Runs on every push to main/develop and every PR targeting them.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    # Postgres for the DB integration test.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bughunter
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d bughunter"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/bughunter

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm install` (not `npm ci`) tolerates platform-specific optional deps
      # that a lockfile generated on another OS may omit (e.g. Tailwind v4's
      # native engine + @emnapi on Linux). The lock still pins versions.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Secret scan
        run: node scripts/scan-secrets.mjs

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Migrate database
        run: npm run db:migrate

      - name: Unit + integration tests
        run: npm run test:run

      - name: Build
        run: npm run build
