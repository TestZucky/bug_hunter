name: CI

# Runs on every PR targeting main and on every push to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # `npm install` (not `npm ci`) tolerates platform-specific optional deps
      # that a lockfile generated on another OS may omit (e.g. Tailwind v4's
      # native engine + @emnapi on Linux). The lock still pins versions.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Secret scan
        run: node scripts/scan-secrets.mjs

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:run

      - name: Build
        run: npm run build
