name: Generate challenges (nightly)

# Runs the generate → validate → dedup → verify pipeline for ALL languages every
# night and opens a single PR with the approved candidates. Nothing merges
# automatically — you review the PR and paste good ones into the app.

on:
  # 00:00 UTC every day. GitHub cron is UTC and may be delayed a few minutes
  # under load. To run at midnight in your timezone, offset the hour
  # (e.g. US Eastern midnight ≈ "0 5 * * *", US Pacific ≈ "0 8 * * *").
  schedule:
    - cron: "0 0 * * *"
  # Manual trigger for testing from the Actions tab.
  workflow_dispatch:
    inputs:
      count:
        description: "candidates per language"
        default: "8"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate & verify (all languages)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4o
          COUNT: ${{ github.event.inputs.count || '8' }}
        run: |
          for lang in javascript python; do
            echo "::group::$lang"
            npm run gen:challenges -- "$lang" "$COUNT" || echo "generation for $lang failed, continuing"
            echo "::endgroup::"
          done

      # Opens/updates one PR only if new files landed in generated/.
      - name: Open PR with generated challenges
        uses: peter-evans/create-pull-request@v6
        with:
          branch: bot/generated-challenges
          title: "Nightly generated challenges"
          commit-message: "chore: add generated challenge candidates"
          body: |
            Auto-generated challenge candidates (JavaScript + Python) that passed
            structural validation, cross-bank + embedding dedup, and the
            adversarial verify pass.

            **Review before merging** — paste good ones into
            `src/content/challenges/*.ts`, then close this PR.
          add-paths: generated/**
