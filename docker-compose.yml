services:
  db:
    image: postgres:16-alpine
    container_name: bughunter-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bughunter
    ports:
      - "5432:5432"
    volumes:
      - bughunter_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bughunter"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  bughunter_pgdata:
